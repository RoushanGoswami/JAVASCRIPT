<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>QUIZ</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body>
    <div class="container">
        <div class="text-center">
            <h1 class="text-center mt-5 ri-font-sans-serif text-bg-info rounded shadow">🧠QUIZ KHAZANA 🤯</h1>
            <p class="text-danger fs-5">Time Left ⌛</p>
            <span id="TimeCounter" style="border: solid black;"
                class="rounded-circle fs-1 fw-bold p-2 text-black">60</span>
            <hr>
        </div>
        <div class="d-flex justify-content-center flex-column align-items-center">
            <div>

                <span id="Question-index" class="fs-4 fw-bold">Q-1</span>
                <p id="Question" class="fs-3">Lorem ipsum dolor sit amet, consectetur adipisicing elit. Nostrum,
                    qui?</p>

                <div id="opt-box-a" class="my-3 bg-light shadow rounded p-2 col-12">
                    <span class="fs-4 fw-bold">A. </span><span id="option-a" class="fs-4">Lorem ipsum dolor sit
                        amet.</span>
                </div>

                <div id="opt-box-b" class="my-3 bg-light shadow rounded p-2 col-12">
                    <span class="fs-4 fw-bold">B. </span><span id="option-b" class="fs-4">Lorem ipsum dolor sit
                        amet.</span>
                </div>

                <div id="opt-box-c" class="my-3 bg-light shadow rounded p-2 col-12">
                    <span class="fs-4 fw-bold">C. </span><span id="option-c" class="fs-4">Lorem ipsum dolor sit
                        amet.</span>
                </div>

                <div id="opt-box-d" class="my-3 bg-light shadow rounded p-2 col-12">
                    <span class="fs-4 fw-bold">D. </span><span id="option-d" class="fs-4">Lorem ipsum dolor sit
                        amet.</span>
                </div>


            </div>
            <div class="d-flex justify-content-end w-50">
                <div class="d-flex justify-content-start">
                    <button id="Next-btn" class="btn btn-outline-secondary">Next</button>
                </div>
            </div>
            <div>
                <h1 id="score"></h1>
            </div>
        </div>
        <hr>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
