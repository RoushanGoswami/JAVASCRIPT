<body>
    <script>
        // 14. Write a function that checks whether a given value exists in an array or not.

        function valueExists(arr) {
            const a = arr.includes(6);
            return a;
        }
        const arr = [1, 2, 3, 4, 5, 6]
        const ans = valueExists(arr);
        document.writeln(ans);
    </script>
