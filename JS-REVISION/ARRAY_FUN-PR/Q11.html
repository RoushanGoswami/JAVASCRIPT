<!DOCTYPE html>

<body>
    <script>
        // 11. Write a function that removes duplicate elements from an array.
        function RemoveDuplicates(arr) {
            for (let i = 0; i < arr.length; i++) {
                for (let j = i + 1; j < arr.length; j++) {

                    if (arr[i] === arr[j]) {
                        arr.splice(j, 1);// ek specific element ko remove kr raha hai
                        j--;// remove krne ke baad firse usi element se compare karne k liye j--;
                    }
                }
            }
            return arr;
        }

        const arr = [1, 2, 2, 7, 7, 44, 85, 7, 9, 7, 2, 98];
        const ans = RemoveDuplicates(arr);
        document.writeln(ans);
    </script>
</body>

</html>
