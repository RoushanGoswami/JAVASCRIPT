<body>
    <script>
        // 12. Write a function that takes an array of numbers and returns the square of each element.

        function SquareOfElements(arr) {
            const square = arr.map(n => n ** 2);
            return square;

            //  let temp = [];
            //for (let i = 0; i < arr.length; i++) {
            //  let temp = document.writeln(arr[i] ** 2);
            // }
            // return temp;
        }


        const arr = [11, 12, 13, 4, 5];
        const ans = SquareOfElements(arr);
        document.writeln(ans);
    </script>
