<body>
    <script>
        // 13. Write a function that merges two arrays into one array.
        function MergeArray(arr, array) {
            const merge = arr.concat(array);// concat - merges arrays 
            return merge;
        }


        const arr = [1, 2, 3, 4, 5];
        const array = [6, 7, 8, 9, 10];
        const ans = MergeArray(arr, array);
        document.writeln(ans);

    </script>
</body>
