<body>
    <script>
        // 2. Write a function that takes an array and returns the largest number in the array.
        function largestNum(arr) {
            let max = arr[0];
            arr.forEach((e) => {
                if (max < e) {
                    max = e;
                }
            })
            return max;
        }
        const arr = [1, 2, 13, 44, 5, 106, 7, 98, 9, 10];
        const ans = largestNum(arr);
        document.writeln(ans);


    </script>
</body>

</html>
