<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 19. Write a JavaScript program to decrement a number using the decrement operator.
      let num = 13;
      document.writeln("Before Decrement : ", num + "<br>");
      num--;
      document.writeln("After Decrement : ", num);
    </script>
  </body>
</html>
