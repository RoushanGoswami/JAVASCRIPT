<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Document</title>
  </head>
  <body>
    <script>
      // 6. Write a JavaScript program to calculate the area of a circle using the formula πr².
      let radius = 55;
      const pi = 3.14;
      let area = (pi * (radius * radius)).toFixed(2);
      document.writeln("The Area of a Circle : ", area);
    </script>
  </body>
</html>
