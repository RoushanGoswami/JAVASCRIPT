<html lang="en">

  <body>
    <script>
      //   20. Write a JavaScript program to check if a number is even or odd using the modulus operator.
      let num = 13;
      if (num % 2 == 0) {
        document.writeln("The Number is Even !");
      } else {
        document.writeln("The Number is Odd !");
      }
    </script>
  </body>
