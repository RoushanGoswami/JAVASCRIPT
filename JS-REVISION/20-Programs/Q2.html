  <body>
    <script>
      //2. Write a JavaScript program to swap two numbers without using a third variable.
      let a = 10;
      let b = 20;
      console.log("Before swapping : ", a, b);
      a = a + b; // a = 30
      b = a - b; // b = 10
      a = a - b; // a = 20
      console.log("After swapping : ", a, b);
    </script>
  </body>
</html>
