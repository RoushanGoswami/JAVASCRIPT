<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Favourite Quotes</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="fav.css">
</head>

<body style="height:100vh;width: 100%;">
    <div class="container">
        <div class="">
            <h1>Your Favourite Quotes</h1>
            <a href="index.html" class="btn btn-outline-info">Back</a>
        </div>
        <div id="fav-box" class="fav-quotes-container">

        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script>
        // to delete the quotes 
        function DeleteQuote(i) {
            console.log("called")
            // to delete the data you first have the data there so get it with local storage
            // jo data aaye use remove kr dene ke baad firse update kr dena hota hai
            const dataQuotes = JSON.parse(localStorage.getItem("favList")); // str to array
            dataQuotes.splice(i, 1);// remove kiya
            localStorage.setItem("favList", JSON.stringify(dataQuotes));// update kr diya 
            displayFavQuotes();// again display kiya 

        }

        const FavContainer = document.getElementById("fav-box");

        function displayFavQuotes() {
            // local storage se data lana hoga favlist ka 
            const dataQuotes = JSON.parse(localStorage.getItem("favList")) || []; // str to array
            // ab jab data mill gaya hai toh ise display krne k liye hame map ke use se sabhi data ko access krna hoga so that 
            // ham use new div me add kr sake 
            FavContainer.innerHTML = "";
            dataQuotes.map((QuoteDta, i) => {
                // div create krna hoga to store the values 
                const div = document.createElement("div");
                div.innerHTML = `<div class=" shadow rounded p-3 m-3">            
                    <p class="fs-3">"${QuoteDta.quote}"</p>
                    <p class ="fs-5">~ ${QuoteDta.author}</p>
            <button onclick="DeleteQuote(${i})" class="btn btn-danger">Remove</button>
                </div>`
                FavContainer.appendChild(div);
            });
        }
        displayFavQuotes();
    </script>
</body>

</html>
