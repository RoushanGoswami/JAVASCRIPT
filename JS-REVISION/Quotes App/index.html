<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Quotes</title>
    <link href="https://cdn.jsdelivr.net/npm/remixicon@4.9.0/fonts/remixicon.css" rel="stylesheet" />
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet" href="style.css">
</head>

<body style="height: 100vh;width: 100%;display: flex;justify-content: center;align-items: center;">

    <body>
        <div class="app-container">
            <div id="quotes-screen" class="quote-card">
                <p id="text-quote">"Lorem ipsum dolor sit amet consectetur."</p>
                <p id="text-author">~ Lorem Ipsum</p>
            </div>

            <div class="controls">
                <button id="btn-pre" class="neo-btn">
                    <i class="ri-skip-back-fill"></i> Previous
                </button>

                <button id="btn-like" class="neo-btn like-btn">
                    Like <i class="ri-heart-line"></i>
                </button>

                <button id="btn-next" class="neo-btn">
                    Next <i class="ri-skip-forward-fill"></i>
                </button>
            </div>

            <a class="fav-btn" href="Favlist.html">Favourite</a>
        </div>
    </body>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
    <script src="script.js"></script>
</body>

</html>
