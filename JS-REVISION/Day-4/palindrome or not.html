        // for loop 

        let num = 151;
        let temp = num;
        let reverse = 0;

        for (temp; temp > 0; temp = Math.floor(temp / 10)) {

            let ld = temp % 10;
            reverse = (reverse * 10) + ld;
        }
        if (num === reverse) {
            document.writeln("Yes , it is palindrome !");
