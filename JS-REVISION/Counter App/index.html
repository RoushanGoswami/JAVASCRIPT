<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>

<body
    style="height: 100vh;width: 100%;display: flex;justify-content: center;align-items: center;flex-direction: column;background-color: rgb(120, 186, 111);">
    <div
        style="height: 50%;width: 50%;display: flex;justify-content: center;align-items: center;flex-direction: column;background-color:lightblue;border-radius: 10px;">
        <div>
            <h1 style="font-size: 100px;;" id="counter">0</h1>
        </div>
        <div>
            <button id="btn-1"
                style="height: 50px;width: 100px;font-weight: bolder;font-size:large;border-radius: 8px;background-color:rgb(85, 221, 85);">++</button>
            <button id="btn-2"
                style="height: 50px;width: 100px;font-weight: bolder;font-size:large;border-radius: 8px;background-color:rgb(192, 30, 30);">--</button>
            <button id="btn-3"
                style="height: 50px;width: 100px;font-weight: bolder;font-size:large;border-radius: 8px;background-color:rgb(214, 214, 38);">*=2</button>
            <button id="btn-4"
                style="height: 50px;width: 100px;font-weight: bolder;font-size:large;border-radius: 8px;background-color:rgb(64, 64, 182);">/=2</button>
            <button id="btn-5"
                style="height: 50px;width: 100px;font-weight: bolder;font-size:large;border-radius: 8px;background-color:lightgreen;">%=2</button>
            <button id="btn-6"
                style="height: 50px;width: 100px;font-weight: bolder;font-size:large;border-radius: 8px;background-color:bisque;">Reset</button>
        </div>
    </div>
    <script src="script.js"></script>
</body>

</html>
