<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>FutureBooks Store</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <!-- Header -->
    <header class="header">
        <h1 class="logo">📚 FutureBooks</h1>
    </header>

    <!-- Search Section -->
    <section class="search-section">
        <div class="search-box">
            <input type="text" id="searchInput" placeholder="Search for books...">
            <button id="searchBtn">Search</button>
        </div>
    </section>

    <!-- Books Display -->
    <section class="books-container" id="booksContainer">
        <!-- Dynamic book cards will appear here -->
    </section>

    <!-- Footer -->
    <footer class="footer">
        <p>© 2026 FutureBooks Store</p>
    </footer>



</body>

</html>
